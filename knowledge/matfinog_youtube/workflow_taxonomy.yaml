# MatFinOg Workflow Taxonomy
# Version: 1.0
# Purpose: Deterministic extraction of reusable workflow patterns and research prompt candidates.

taxonomy_metadata:
  version: "1.0"
  last_updated: "2026-05-21"
  description: "Initial workflow taxonomy for MatFinOg YouTube corpus."

workflows:
  - workflow_id: research_paper_to_backtest_workflow
    description: "Identify mentions of finding papers, reading claims, replicating strategy logic, coding a test, and validating results."
    relevant_topic_ids:
      - research_paper_replication
      - backtesting_and_validation
      - ai_assisted_research_workflow
    keywords:
      - research paper
      - replicate
      - replication
      - paper
      - backtest
      - validate
      - Python
      - MultiCharts
      - SSRN
      - VWAP
      - Zarattini
      - Aziz
    phrase_patterns:
      - "research paper"
      - "replicate"
      - "replication"
      - "paper"
      - "backtest"
      - "validate"
      - "Python"
      - "MultiCharts"
      - "SSRN"
      - "VWAP"
      - "Zarattini"
      - "Aziz"
    minimum_score: 2
    evidence_rules: "Keyword or phrase matches with topic overlap."
    allowed_use: "learning, research organisation, workflow planning, future PRD planning"
    forbidden_use: "financial advice, trading signals, investment recommendations, live trading automation, broker execution"
    safety_notes: "Focus on the methodology of replication, not the signal profitability."

  - workflow_id: market_inefficiency_hypothesis_workflow
    description: "Identify market structure or institutional constraint ideas that can become research hypotheses."
    relevant_topic_ids:
      - market_structure_inefficiency
      - execution_and_microstructure
      - crypto_market_structure
    keywords:
      - inefficiency
      - market structure
      - forced buying
      - forced selling
      - institutional
      - regulation
      - liquidity
      - specific hours
      - fund managers
      - constraints
    phrase_patterns:
      - "inefficiency"
      - "market structure"
      - "forced buying"
      - "forced selling"
      - "institutional"
      - "regulation"
      - "liquidity"
      - "specific hours"
      - "fund managers"
      - "constraints"
    minimum_score: 2
    evidence_rules: "Keyword or phrase matches with topic overlap."
    allowed_use: "learning, research organisation, workflow planning, future PRD planning"
    forbidden_use: "financial advice, trading signals, investment recommendations, live trading automation, broker execution"
    safety_notes: "Analyse the 'why' of price movement, do not generate 'buy' signals."

  - workflow_id: risk_first_strategy_review_workflow
    description: "Identify risk-management-first thinking before any strategy is promoted."
    relevant_topic_ids:
