# Backtest Execution Preflight Schema

version: "1.0"
description: "Schema for final preflight before any future backtest runner."

required_fields:
  - preflight_id
  - linked_strategy_candidate_id
  - linked_readiness_id
  - linked_backtest_plan_id
  - linked_approval_validation_id
  - linked_eligibility_report_id
  - linked_manual_dataset_import_id
  - preflight_status
  - all_gates_valid
  - dataset_import_valid
  - approval_valid
  - eligibility_valid
  - backtest_runner_available
  - execution_allowed
  - blocking_issues
  - allowed_next_actions
  - forbidden_next_actions
  - human_review_required
  - created_at
  - safety_financial_advice_generated
  - safety_trading_signal_generated
  - safety_bot_logic_generated
  - safety_live_trading_logic_generated

allowed_values:
  preflight_status:
    - blocked
    - pending
    - ready_for_future_single_backtest_execution

forbidden_statuses:
  - approved_strategy
  - approved_backtest
  - approved_signal
  - paper_trading
  - live_trading

safety_rules:
  - execution_allowed MUST be false unless all gates explicitly pass
  - safety_financial_advice_generated MUST be false
  - safety_trading_signal_generated MUST be false
  - safety_bot_logic_generated MUST be false
  - safety_live_trading_logic_generated MUST be false
