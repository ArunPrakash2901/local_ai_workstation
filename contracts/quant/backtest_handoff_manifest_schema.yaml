# Backtest Handoff Manifest Schema

version: "1.0"
description: "Schema for handing off a validated, reviewed candidate to the backtest queue."

required_fields:
  - handoff_id
  - linked_strategy_candidate_id
  - linked_readiness_id
  - handoff_status
  - intended_backtest_scope
  - required_datasets
  - required_features
  - cost_model
  - slippage_model
  - validation_protocol
  - bias_checks
  - risk_checks
  - expected_artifacts
  - allowed_next_actions
  - forbidden_next_actions
  - human_approval_required
  - created_at
  - safety_financial_advice_generated
  - safety_trading_signal_generated
  - safety_bot_logic_generated
  - safety_live_trading_logic_generated

allowed_values:
  handoff_status:
    - draft
    - blocked
    - ready_for_human_backtest_review

forbidden_statuses:
  - backtest_running
  - backtest_passed
  - approved_strategy
  - approved_signal
  - paper_trading
  - live_trading

safety_rules:
  - safety_financial_advice_generated MUST be false
  - safety_trading_signal_generated MUST be false
  - safety_bot_logic_generated MUST be false
  - safety_live_trading_logic_generated MUST be false
