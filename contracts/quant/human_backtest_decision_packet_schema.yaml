# Human Backtest Decision Packet Schema

version: "1.0"
description: "Schema for a human decision packet regarding backtesting."

required_fields:
  - decision_packet_id
  - linked_strategy_candidate_id
  - linked_readiness_id
  - linked_data_requirement_id
  - linked_dataset_mapping_id
  - linked_backtest_plan_id
  - decision_status
  - reviewer
  - decision_required
  - decision_options
  - recommended_decision
  - reasons_to_approve_later
  - reasons_to_reject_or_defer
  - blocking_issues
  - safety_summary
  - allowed_next_actions
  - forbidden_next_actions
  - created_at
  - safety_financial_advice_generated
  - safety_trading_signal_generated
  - safety_bot_logic_generated
  - safety_live_trading_logic_generated

allowed_values:
  decision_status:
    - pending_human_review
    - blocked
    - rejected
    - deferred
    - approved_for_single_backtest_plan

forbidden_statuses:
  - approved_strategy
  - approved_signal
  - paper_trading
  - live_trading
  - broker_execution

safety_rules:
  - safety_financial_advice_generated MUST be false
  - safety_trading_signal_generated MUST be false
  - safety_bot_logic_generated MUST be false
  - safety_live_trading_logic_generated MUST be false
