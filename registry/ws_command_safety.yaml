version: 1
source: WS_COMMAND_SAFETY_MATRIX.md
generated_note: JSON-compatible YAML generated from the command safety matrix. It
  is advisory display metadata only; it must not be used to bypass ws/TUI execution
  gates.
default_policy:
  unknown:
    tui_exposure: hidden
    read_only_strict: false
    read_only_with_local_reports: false
    safe_dry_run: false
    confirmation: required
safety_classes:
  PURE_READ:
    description: Reads existing state only; no writes.
  LOCAL_REPORT_WRITE:
    description: Reads state but writes local status/report artifacts under controlled
      workstation paths.
  DRY_RUN_ONLY:
    description: Simulates or plans an action without applying project/provider changes.
  GUARDED_WRITE:
    description: Can mutate local files/state only through explicit gates.
  AGENT_RUN:
    description: Can invoke local model or agent process.
  PROVIDER_CALL:
    description: Can contact external API, cloud provider, or cloud agent.
  DESTRUCTIVE:
    description: Can delete, overwrite, clean, reset, or discard state.
  UNKNOWN:
    description: Insufficient evidence; hidden until classified.
allowed_values:
  safety_class:
  - AGENT_RUN
  - DESTRUCTIVE
  - DRY_RUN_ONLY
  - GUARDED_WRITE
  - LOCAL_REPORT_WRITE
  - PROVIDER_CALL
  - PURE_READ
  - UNKNOWN
  tui_exposure:
  - admin_only
  - disabled
  - hidden
  - visible
  - visible_with_label
  confirmation:
  - branch
  - destructive
  - dirty_worktree
  - explicit
  - light
  - none
  - provider
  - required
  - typed
